{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>All Sales</title>
    <link rel="stylesheet" href="{% static 'style.css' %}">
</head>
<body>
    {% include 'nav.html' %}
    <h2>All Sales</h2>
    <table>
        <thead>
            <tr><th>Sale #</th><th>Date</th><th>Total</th><th></th></tr>
        </thead>
        <tbody>
        {% for sale in sales %}
            <tr>
                <td>{{ sale.id }}</td>
                <td>{{ sale.date }}</td>
                <td>{{ sale.total_price }}</td>
                <td><a href="{% url 'sale_report' sale.id %}">View</a></td>
            </tr>
        {% empty %}
            <tr><td colspan="4">No sales yet.</td></tr>
        {% endfor %}
        </tbody>
    </table>
</body>
</html>
